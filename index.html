<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Versión Caducada</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow:wght@400;600;700&display=swap');

    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --pantone-185c: #ED1C24;
      --pantone-185c-light: rgba(237, 28, 36, 0.08);
      --pantone-185c-mid: rgba(237, 28, 36, 0.18);
    }

    html, body {
      height: 100%;
      width: 100%;
      background-color: #f2f2f2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Barlow', sans-serif;
    }

    .card {
      background: #ffffff;
      border: 3px solid var(--pantone-185c);
      border-radius: 10px;
      width: min(88vw, 420px);
      padding: 52px 40px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      box-shadow:
        0 0 0 6px var(--pantone-185c-light),
        0 8px 32px rgba(237, 28, 36, 0.12),
        0 2px 8px rgba(0,0,0,0.06);
      animation: fadeIn 0.5s ease both;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: var(--pantone-185c-light);
      border: 2px solid var(--pantone-185c-mid);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .icon-wrap svg {
      width: 32px;
      height: 32px;
    }

    .label-caducada {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--pantone-185c);
      background: var(--pantone-185c-light);
      border: 1px solid var(--pantone-185c-mid);
      padding: 4px 12px;
      border-radius: 100px;
    }

    .message {
      font-size: 20px;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      line-height: 1.35;
    }

    .sub {
      font-size: 14px;
      font-weight: 400;
      color: #666;
      text-align: center;
      line-height: 1.55;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: linear-gradient(to right, transparent, var(--pantone-185c-mid), transparent);
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon-wrap">
      <!-- Clock / expired icon -->
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="12" cy="12" r="9" stroke="#ED1C24" stroke-width="2"/>
        <path d="M12 7v5l3 3" stroke="#ED1C24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M4.5 4.5L19.5 19.5" stroke="#ED1C24" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
    </div>

    <span class="label-caducada">Versión caducada</span>

    <div class="divider"></div>

    <p class="message">Solicita la nueva versión</p>

    <p class="sub">Esta versión de la aplicación ya no está activa.<br>Contacta con el administrador para obtener la versión actualizada.</p>
  </div>
</body>
</html>
